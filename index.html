<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  button{-webkit-appearance:none;appearance:none;font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
  a{-webkit-tap-highlight-color:transparent}

/* ── Fixed light theme ── */
:root{
–orange:    #FF6B00;
–orange-lt: #FFE8D6;
–orange-md: #FFD4B0;
–orange-dk: #C44D00;
–bg:        #ffffff;
–bg2:       #FFFAF6;
–card:      #ffffff;
–bdr:       #EEE2D8;
–bdr-strong:#E0C8B0;
–txt:       #111111;
–txt2:      #444444;
–mu:        #999999;
–tip-c:     #777777;
–pill-bg:   #F5EDE6;
–pill-c:    #333333;
–secln:     #EEE2D8;
–hint-c:    #CC3300;
–wnote:     #555555;
}

body{background:var(–bg);color:var(–txt);font-family:‘DM Serif Display’,Georgia,serif;min-height:100vh;padding-bottom:80px;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}

/* Header */
.hdr{background:#ffffff;border-bottom:2px solid var(–bdr);padding:26px 20px 20px;text-align:center;position:relative;overflow:hidden}
.hdr::before{content:’’;position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,#FFE8D680,transparent 65%);pointer-events:none}
.htag{font-family:‘DM Mono’,monospace;font-size:23px;letter-spacing:.28em;color:var(–txt);text-transform:uppercase;font-weight:700}
.htag span{color:var(–orange)}
.htag-bar{width:40px;height:3px;background:var(–orange);border-radius:2px;margin:7px auto 0}
.hdr h1{display:none}
.hdate{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–mu);margin-top:5px;letter-spacing:.08em}

/* Layout */
.wrap{max-width:520px;margin:0 auto;padding:22px 16px 40px}
.lbl{font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:.22em;color:var(–mu);text-transform:uppercase;margin-bottom:10px;margin-top:22px;display:flex;align-items:center;gap:10px}
.lbl::after{content:’’;flex:1;height:1px;background:var(–secln)}
.lbl:first-child{margin-top:0}

/* Goal buttons */
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.gbtn{padding:16px 10px;border-radius:14px;background:var(–orange-lt);color:var(–txt) !important;border:1.5px solid transparent;font-family:‘DM Mono’,monospace;font-size:11px;font-weight:600;text-align:center;transition:all .16s;display:flex;flex-direction:column;align-items:center;gap:6px;-webkit-appearance:none}
.gbtn .gi{font-size:22px}
.gbtn:active{background:var(–orange-md)}
.gbtn.on{background:var(–orange);color:#ffffff !important;border-color:var(–orange);box-shadow:0 4px 18px #FF6B0025}

/* Muscle chips */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:7px 14px;border-radius:20px;background:var(–orange-lt);color:var(–txt) !important;border:1.5px solid transparent;font-family:‘DM Mono’,monospace;font-size:11px;font-weight:600;transition:all .14s;-webkit-appearance:none}
.chip:active{background:var(–orange-md)}
.chip.on{background:var(–orange);color:#ffffff !important;border-color:var(–orange)}

/* Equipment */
.eq-row{display:flex;gap:9px}
.ebtn{flex:1;padding:14px 6px;border-radius:14px;background:var(–orange-lt);color:var(–txt) !important;border:1.5px solid transparent;transition:all .16s;display:flex;flex-direction:column;align-items:center;gap:5px;-webkit-appearance:none}
.ebtn .ei{font-size:22px}
.ebtn .el{font-family:‘DM Mono’,monospace;font-size:10px;font-weight:600}
.ebtn.on{background:var(–orange);color:#ffffff !important;border-color:var(–orange);box-shadow:0 4px 14px #FF6B0022}

/* Duration */
.dur-row{display:flex;gap:8px}
.dbtn{flex:1;padding:12px 4px;border-radius:12px;background:var(–orange-lt);color:var(–txt) !important;border:1.5px solid transparent;font-family:‘DM Mono’,monospace;font-size:11px;font-weight:700;text-align:center;transition:all .15s;-webkit-appearance:none}
.dbtn.on{background:var(–orange);color:#ffffff !important;border-color:var(–orange);box-shadow:0 3px 12px #FF6B0022}

/* Hint */
.hint{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–hint-c);margin-top:10px;display:none;text-align:center}

/* Generate button — solid black */
.genbtn{width:100%;padding:18px;background:#111111;border:none;border-radius:14px;color:#ffffff !important;font-size:14px;font-weight:700;letter-spacing:.1em;font-family:‘DM Mono’,monospace;text-transform:uppercase;box-shadow:0 4px 20px #00000018;margin-top:22px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .16s;-webkit-appearance:none}
.genbtn:active{background:#2a2a2a;transform:translateY(1px)}

/* Output */
.out{display:none;margin-top:28px}

/* Workout header — solid black with orange left stripe */
.w-hdr{border-radius:16px;padding:20px 20px 18px;margin-bottom:22px;position:relative;overflow:hidden;background:#111111;color:#ffffff}
.w-hdr::before{content:’’;position:absolute;top:0;left:0;width:5px;height:100%;background:var(–orange);border-radius:16px 0 0 16px}
.w-hdr::after{content:’’;position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#FF6B0022,transparent 70%);pointer-events:none}
.wfocus{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–orange);letter-spacing:.22em;text-transform:uppercase;margin-bottom:5px}
.wtop{display:flex;justify-content:space-between;align-items:flex-start}
.wtitle{font-size:20px;font-weight:700;color:#ffffff;line-height:1.2;flex:1;padding-right:10px}
.durpill{border-radius:10px;padding:7px 12px;text-align:center;flex-shrink:0;background:#ffffff14;border:1px solid #ffffff22}
.durpill-n{font-family:‘DM Mono’,monospace;font-size:15px;font-weight:700;color:#ffffff}
.durpill-l{font-family:‘DM Mono’,monospace;font-size:9px;color:#ffffff66;letter-spacing:.15em;text-transform:uppercase}
.wnote{margin-top:10px;font-size:13px;color:#ffffffaa;font-style:italic;line-height:1.5}

/* Sections */
.sec{margin-bottom:22px}
.sechd{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.secline{flex:1;height:1px;background:var(–secln)}
.secttl{font-family:‘DM Mono’,monospace;font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(–orange-dk)}

/* Exercise cards */
.ex{background:var(–card);border:1.5px solid var(–bdr);border-radius:14px;margin-bottom:9px;overflow:hidden}
.exb{padding:13px 15px 12px}
.ext{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.exn{font-weight:600;color:var(–txt);font-size:14px;flex:1;line-height:1.3}
.pills{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;margin-top:2px}
.pill{border-radius:8px;padding:3px 9px;font-family:‘DM Mono’,monospace;font-size:10px;font-weight:600;white-space:nowrap}
.pdim{background:var(–pill-bg);border:1px solid var(–bdr);color:var(–pill-c)}
.tip{margin-top:7px;font-size:11px;color:var(–tip-c);font-family:‘DM Mono’,monospace;line-height:1.5}

/* YouTube link */
.yt-link{display:flex;align-items:center;gap:8px;padding:10px 15px;border-top:1.5px solid var(–bdr);background:var(–bg2);text-decoration:none;color:var(–orange-dk);font-family:‘DM Mono’,monospace;font-size:11px;font-weight:600;transition:background .14s}
.yt-link:active{background:var(–orange-lt)}
.yt-icon{width:18px;height:13px;background:#FF0000;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.yt-icon::after{content:’’;border-left:7px solid #fff;border-top:4px solid transparent;border-bottom:4px solid transparent;margin-left:1px}

/* Chip hint */
.chip-hint{color:#cccccc;font-size:9px;margin-left:2px}

/* Accent classes used by generate() */
.accent-txt{color:var(–orange-dk)}
.pill-accent{background:var(–orange-lt);border:1px solid var(–bdr-strong);color:var(–txt);font-weight:700}
.ex-accent{border-left:3px solid var(–orange)!important}
</style>

</head>
<body>

<div class="hdr">
  <div class="htag">Daily <span>⚡</span> Forge</div>
  <div class="htag-bar"></div>
  <h1 style="display:none">Daily Forge</h1>
  <div class="hdate" id="hdate"></div>
</div>

<div class="wrap">
  <div class="lbl">What's your goal?</div>
  <div class="goal-grid">
    <button class="gbtn" data-v="tone"     onclick="pick('g',this)"><span class="gi">✨</span>Tone &amp; Firm</button>
    <button class="gbtn" data-v="muscle"   onclick="pick('g',this)"><span class="gi">💪</span>Build Muscle</button>
    <button class="gbtn" data-v="strength" onclick="pick('g',this)"><span class="gi">🏋️</span>Increase Strength</button>
    <button class="gbtn" data-v="fat"      onclick="pick('g',this)"><span class="gi">🔥</span>Burn Fat</button>
  </div>

  <div class="lbl">Target muscles <span class="chip-hint">(tap one or more)</span></div>
  <div class="chips" id="chips">
    <button class="chip" data-v="Full Body"  onclick="toggleChip(this)">Full Body</button>
    <button class="chip" data-v="Chest"      onclick="toggleChip(this)">Chest</button>
    <button class="chip" data-v="Back"       onclick="toggleChip(this)">Back</button>
    <button class="chip" data-v="Shoulders"  onclick="toggleChip(this)">Shoulders</button>
    <button class="chip" data-v="Arms"       onclick="toggleChip(this)">Arms</button>
    <button class="chip" data-v="Core"       onclick="toggleChip(this)">Core</button>
    <button class="chip" data-v="Glutes"     onclick="toggleChip(this)">Glutes</button>
    <button class="chip" data-v="Legs"       onclick="toggleChip(this)">Legs</button>
    <button class="chip" data-v="Hamstrings" onclick="toggleChip(this)">Hamstrings</button>
    <button class="chip" data-v="Cardio"     onclick="toggleChip(this)">Cardio</button>
  </div>

  <div class="lbl">Equipment</div>
  <div class="eq-row">
    <button class="ebtn" data-v="gym"  onclick="pick('e',this)"><span class="ei">🏋️</span><span class="el">Full Gym</span></button>
    <button class="ebtn" data-v="body" onclick="pick('e',this)"><span class="ei">🤸</span><span class="el">Body Weight</span></button>
    <button class="ebtn" data-v="db"   onclick="pick('e',this)"><span class="ei">🏃</span><span class="el">Dumbbells</span></button>
  </div>

  <div class="lbl">Workout duration</div>
  <div class="dur-row">
    <button class="dbtn" data-v="15" onclick="pick('d',this)">15 min</button>
    <button class="dbtn" data-v="30" onclick="pick('d',this)">30 min</button>
    <button class="dbtn" data-v="45" onclick="pick('d',this)">45 min</button>
    <button class="dbtn" data-v="60" onclick="pick('d',this)">60 min</button>
  </div>

  <div class="hint" id="hint">⚠️ Please select a goal, muscle group(s), equipment, and duration.</div>
  <div style="display:flex;gap:9px;margin-top:20px">
    <button class="genbtn" style="margin-top:0" onclick="generate(false)">⚡ Today's Workout</button>
    <button class="genbtn" style="margin-top:0;flex:0 0 auto;width:54px;font-size:20px;padding:17px 0;letter-spacing:0" onclick="generate(true)" title="Shuffle">🔀</button>
  </div>
  <div class="out" id="out"></div>
</div>

<script>
document.getElementById('hdate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

function pick(g,btn){
  document.querySelectorAll(g==='g'?'.gbtn':g==='e'?'.ebtn':'.dbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function toggleChip(btn){
  const on=document.querySelectorAll('#chips .chip.on');
  if(btn.classList.contains('on')&&on.length===1)return;
  btn.classList.toggle('on');
}
function getG(){return(document.querySelector('.gbtn.on')||{dataset:{}}).dataset.v}
function getE(){return(document.querySelector('.ebtn.on')||{dataset:{}}).dataset.v}
function getD(){return parseInt((document.querySelector('.dbtn.on')||{dataset:{}}).dataset.v)||0}
function getM(){return Array.from(document.querySelectorAll('#chips .chip.on')).map(b=>b.dataset.v)}

// ── Exercise library (14+ per category for maximum daily variety) ─────────────
const EX={

function getTip(n){const l=(n||'').toLowerCase();for(const[k,v]of Object.entries(TIPS)){if(k.toLowerCase()===l)return v;}for(const[k,v]of Object.entries(TIPS)){if(l.includes(k.toLowerCase()))return v;}return'Focus on form and full range of motion.'}

// ── RNG ───────────────────────────────────────────────────────────────────────
function makeRng(seed){let s=seed>>>0;return()=>{s=(Math.imul(1664525,s)+1013904223)>>>0;return s/4294967296}}
function pickN(arr,n,rand){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,n)}

// ── Meta ──────────────────────────────────────────────────────────────────────
const META={
  tone:    {titles:["Sculpt Session","Definition Day","Lean & Tone","Tighten Up","Shape & Define","Tone Circuit","Body Sculpt"],focuses:["Sculpt & Tone","Definition Work","Toning Circuit","Shape & Firm","Lean Muscle"],notes:["Consistency builds the body you want.","Light weights, full control — that's where definition lives.","Every rep reshapes. Stay intentional.","The burn means it's working.","Small weights, big results."]},
  muscle:  {titles:["Mass Builder","Hypertrophy Day","Size & Strength","Growth Session","Volume Push","Gainz Protocol"],focuses:["Hypertrophy","Muscle Growth","Size Protocol","Volume Day","Mass Building"],notes:["Progressive overload is the only way.","Big lifts build big bodies. No shortcuts.","Volume builds muscle. Earn every set.","Track your weights — beat them next time.","You grow during rest, but only if you earned it."]},
  strength:{titles:["Power Session","Strength Builder","Heavy Day","Force Protocol","Max Effort","Raw Power"],focuses:["Max Strength","Power Protocol","Strength Base","Heavy Compound","Raw Power"],notes:["Heavy and slow builds what light and fast can't.","The bar doesn't care how you feel.","One more rep, one more lb — progress compounds.","Strength is a skill. Practice it.","Every heavy set is a deposit in your strength bank."]},
  fat:     {titles:["Fat Furnace","Metabolic Blast","Burn Circuit","HIIT Session","Torch Time","Calorie Crusher"],focuses:["Fat Burn","Metabolic Burn","Cardio Strength","HIIT Circuit","Calorie Torch"],notes:["Maximum effort, minimum rest.","Burn more, rest less. Keep that heart rate up.","Heart pounding, lungs burning — that's the goal.","Sweat is just fat crying. Keep going.","Every second of effort counts."]}
};
const WARMUPS={
  gym: [[{n:"Treadmill Walk",d:"3 min",t:"Incline 4, open the hips"},{n:"Arm Circles + Leg Swings",d:"2 min",t:"Full range — front, back, across"}],
        [{n:"Rowing Machine",d:"3 min",t:"Easy pace, open the chest"},{n:"Hip Circles",d:"2 min",t:"Slow big circles"}]],
  body:[[{n:"Jumping Jacks",d:"2 min",t:"Full body warm-up"},{n:"Leg Swings",d:"2 min",t:"Front-back and side-to-side"}],
        [{n:"High Knees",d:"2 min",t:"Drive knees to waist height"},{n:"Inchworm",d:"2 min",t:"Walk hands out to plank and back"}]],
  db:  [[{n:"Arm Swings",d:"2 min",t:"Cross-body and overhead"},{n:"Squat to Stand",d:"2 min",t:"Hands behind head, mobility warm-up"}],
        [{n:"High Knees",d:"2 min",t:"Get blood moving"},{n:"Shoulder Rolls",d:"2 min",t:"Forward and back, full range"}]]

const COOLDOWNS=[
  [{n:"Hip Flexor Stretch",d:"2 min",t:"Lunge position, tuck pelvis, 30s each"},{n:"Hamstring Stretch",d:"2 min",t:"Seated, flat back, lean forward"},{n:"Child's Pose",d:"1 min",t:"Wide knees, arms extended, breathe"}],
  [{n:"Pigeon Pose",d:"2 min",t:"Both hips, 60s each"},{n:"Spinal Twist",d:"1 min",t:"Lie on back, knee across each side"},{n:"Chest Stretch",d:"1 min",t:"Arms wide, open the pecs"}],
  [{n:"Cat-Cow",d:"2 min",t:"Sync movement with breath"},{n:"Shoulder Stretch",d:"1 min",t:"Cross body, 30s each arm"},{n:"Standing Forward Fold",d:"2 min",t:"Soft knees, hang heavy"}]
];
function getParams(goal,dur,rand){
  const r=rand();
  const sets=dur<=15?'2':dur<=30?'3':dur<=45?'4':'5';
  if(goal==='tone')     return{sets,reps:`${12+Math.floor(r*6)}-${15+Math.floor(r*6)}`,rest:'40s'};
  if(goal==='muscle')   return{sets,reps:`${8+Math.floor(r*4)}-${10+Math.floor(r*4)}`,rest:'75s'};
  if(goal==='strength') return{sets,reps:`${3+Math.floor(r*3)}-${5+Math.floor(r*3)}`,rest:'120s'};
  return{sets,reps:`${15+Math.floor(r*6)}-${18+Math.floor(r*6)}`,rest:'30s'};
}
function numEx(dur){return dur<=15?3:dur<=30?4:dur<=45?6:8}

// ── Generate ──────────────────────────────────────────────────────────────────
let shuffleCount = 0;

function generate(shuffle){
  const goal=getG(),equip=getE(),muscles=getM(),dur=getD();
  const hint=document.getElementById('hint');
  if(!goal||!equip||!dur||!muscles.length){hint.style.display='block';return;}
  hint.style.display='none';

  if(shuffle) shuffleCount++;

  const doy=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/86400000);
  const muscleKey=[...muscles].sort().join(',');
  let hash=0;for(const c of(goal+equip+muscleKey+dur))hash=(Math.imul(31,hash)+c.charCodeAt(0))>>>0;
  const seed=(hash+(doy+shuffleCount*7919)*999983)>>>0;
  const rand=makeRng(seed);

  let pool=[];muscles.forEach(m=>{pool=pool.concat(EX[equip][m]||EX[equip]['Full Body'])});
  pool=[...new Set(pool)];
  const main=pickN(pool,Math.min(numEx(dur),pool.length),rand);

  const m=META[goal];
  const wu=WARMUPS[equip];
  const w={
    title:m.titles[Math.floor(rand()*m.titles.length)],
    duration:dur+' min',
    focus:m.focuses[Math.floor(rand()*m.focuses.length)],
    note:m.notes[Math.floor(rand()*m.notes.length)],
    warmup:wu[Math.floor(rand()*wu.length)],
    main:main.map(name=>({name,...getParams(goal,dur,rand),tip:getTip(name)})),
    cooldown:COOLDOWNS[Math.floor(rand()*COOLDOWNS.length)]
  };

  const el=document.getElementById('out');
  el.innerHTML=`
    <div class="w-hdr">
      <div class="wfocus">${x(w.focus)}</div>
      <div class="wtop">
        <div class="wtitle">${x(w.title)}</div>
        <div class="durpill"><div class="durpill-n">${x(w.duration)}</div><div class="durpill-l">duration</div></div>
      </div>
      <p class="wnote">"${x(w.note)}"</p>
    </div>
    ${sec('Warm-Up','🌡️','',w.warmup,'c')}
    ${sec('Main Workout','💥','',w.main,'s')}
    ${sec('Cool-Down','🧘','',w.cooldown,'c')}`;
  el.style.display='block';
  setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function sec(title,icon,color,items,type){
  return`<div class="sec">
    <div class="sechd"><span style="font-size:14px">${icon}</span><span class="secttl accent-txt">${title}</span><div class="secline"></div></div>
    ${(items||[]).map((item)=>{
      const name=item.name||item.n, tip=item.tip||item.t, dur2=item.duration||item.d;
      const pills=type==='s'
        ?`<span class="pill pill-accent">${x(item.sets)} sets</span>
          <span class="pill pill-accent">${x(item.reps)} reps</span>
          ${item.rest?`<span class="pill pdim">rest ${x(item.rest)}</span>`:''}`
        :`<span class="pill pill-accent">${x(dur2)}</span>`;
      return`<div class="ex ex-accent">
        <div class="exb">
          <div class="ext"><span class="exn">${x(name)}</span><div class="pills">${pills}</div></div>
          ${tip?`<div class="tip">💡 ${x(tip)}</div>`:''}
        </div>
        <a class="yt-link" href="${getYT(name)}" target="_blank" rel="noopener noreferrer">
          <span class="yt-icon"></span>Watch on YouTube
        </a>
      </div>`;
    }).join('')}
  </div>`;
}

function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
